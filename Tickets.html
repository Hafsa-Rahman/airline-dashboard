<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AeroDesk — Ticket Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="tickets" class="flex min-h-screen">

<div id="sidebarOverlay" class="sidebar-overlay"></div>

<aside id="sidebar" class="sidebar flex flex-col">
  <div class="flex items-center justify-between px-5 py-6">
    <div class="flex items-center gap-3">
      <div class="brand-mark w-9 h-9 rounded-lg flex items-center justify-center">
        <i data-lucide="plane" class="w-5 h-5 text-white"></i>
      </div>
      <div>
        <p class="font-display text-white font-semibold leading-tight">AeroDesk</p>
        <p class="text-[11px] text-slate-400 tracking-wide">OPERATIONS CONSOLE</p>
      </div>
    </div>
    <button id="closeSidebar" class="lg:hidden text-slate-300"><i data-lucide="x" class="w-5 h-5"></i></button>
  </div>
  <div class="runway-divider mx-5"></div>
  <nav class="flex-1 px-4 py-5 space-y-1">
    <p class="px-3 text-[11px] font-semibold tracking-wider text-slate-500 uppercase mb-2">Main</p>
    <a href="index.html" class="nav-link flex items-center"><i data-lucide="layout-dashboard"></i>Home Dashboard</a>
    <a href="tickets.html" class="nav-link active flex items-center"><i data-lucide="ticket"></i>Ticket Management</a>
    <p class="px-3 text-[11px] font-semibold tracking-wider text-slate-500 uppercase mt-5 mb-2">Flight Board</p>
    <a href="departures.html" class="nav-link flex items-center"><i data-lucide="plane-takeoff"></i>Departures</a>
    <a href="arrivals.html" class="nav-link flex items-center"><i data-lucide="plane-landing"></i>Arrivals</a>
  </nav>
</aside>

<div class="flex-1 flex flex-col min-w-0">
  <header class="topbar sticky top-0 z-30 flex items-center justify-between gap-4 px-5 lg:px-8 py-4">
    <div>
      <h1 class="font-display text-lg font-semibold text-slate-900">Ticket Management</h1>
      <p class="text-xs text-slate-500">Search, book, and manage passenger tickets</p>
    </div>
    <div id="liveClock" class="live-clock font-mono-data hidden sm:block"></div>
  </header>

  <main class="flex-1 px-5 lg:px-8 py-6 space-y-6">
    
    <!-- Existing Ticket Table -->
    <section class="panel-card p-5">
      <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-3 mb-5">
        <div class="flex flex-col sm:flex-row gap-3 flex-1">
          <input id="ticketSearch" type="text" placeholder="Search..." class="field max-w-sm w-full" />
          <select id="ticketStatusFilter" class="field">
            <option value="All">All Statuses</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Pending">Pending</option>
          </select>
        </div>
        <button id="newTicketBtn" class="btn-primary flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> New Ticket</button>
      </div>
      <div class="overflow-x-auto">
        <table class="data-table w-full">
          <thead>
            <tr><th>Ticket ID</th><th>Passenger</th><th>Flight</th><th>Route</th><th>Date</th><th>Seat</th><th>Class</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="ticketsBody"></tbody>
        </table>
      </div>
    </section>

    <!-- NEW: Booking & Menu Section -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <section class="panel-card p-5">
        <h3 class="font-semibold mb-4">Book Ticket from Anywhere</h3>
        <div class="flex flex-col gap-3">
          <input type="text" id="origin" placeholder="Origin (e.g. LHE)" class="field w-full">
          <input type="text" id="destination" placeholder="Destination (e.g. DXB)" class="field w-full">
          <input type="number" id="luggage" placeholder="Luggage weight (kg)" class="field w-full">
          <button onclick="processBooking()" class="btn-primary">Book Now</button>
        </div>
      </section>

      <section class="panel-card p-5">
        <h3 class="font-semibold mb-4">In-Flight Lunch Menu</h3>
        <ul id="menu-list" class="text-sm text-slate-700 space-y-2"></ul>
      </section>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="ticketModal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4" style="background:rgba(10,17,32,0.5)">
  <div class="bg-white rounded-2xl w-full max-w-lg p-6">
    <!-- Modal content remains same as your original code -->
  </div>
</div>

<script type="module" src="js/script.js"></script>
</body>
</html>
